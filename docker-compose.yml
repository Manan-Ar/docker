services:

  # ---------------------------------------------------------------------------
  # PostgreSQL database container
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: grades_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist data across container restarts
      - postgres_data:/var/lib/postgresql/data
      # Run the init script on first startup to seed sample data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Flask REST API container
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grades_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy   # Wait until PostgreSQL is ready before starting
    environment:
      - FLASK_ENV=development

# Named volume for persistent PostgreSQL storage
volumes:
  postgres_data:

# Shared network so both containers can communicate by service name
networks:
  default:
    name: grades_network
